  /timeseries:
    get:
      summary: Time-series
      description: >
        If supported by your subscription plan, the Fixer API's Time-Series
        endpoint lets you query the API for daily historical rates between two
        dates of your choice, with a maximum time frame of 365 days.
          
           
        **NOTE:** Because the trading/markets are closed over the weekend,
        weekend days data is the last available known trading/market data.
      operationId: getTimeSeries
      parameters:
        - name: access_key
          in: query
          required: true
          schema:
            type: string
          description: Your Fixer API access key.
          example: YOUR_API_KEY
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: >-
            Start date (inclusive) for timeseries/fluctuation queries
            (YYYY-MM-DD). Max window 365 days.
          example: '2015-12-01'
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: >-
            End date (inclusive) for timeseries/fluctuation queries
            (YYYY-MM-DD).
          example: '2015-12-24'
        - name: base
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}$
          description: >
            Base currency (three-letter ISO code) to which returned rates are
            relative. Default base is EUR. Changing base may be restricted by
            subscription plan. :contentReference[oaicite:3]{index=3}
          example: USD
        - name: symbols
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}(,[A-Z]{3})*$
          description: >
            Comma-separated list of currency codes to limit the `rates`/`quotes`
            output (e.g., `USD,GBP,JPY`).
          example: USD,GBP,JPY
        - name: callback
          in: query
          required: false
          schema:
            type: string
          description: >-
            JSONP callback function name. If provided, the response will be
            wrapped in this function.
          example: myCallback
      responses:
        '200':
          description: Time-series rates keyed by ISO date.
          content:
            application/json:
              schema:
                type: object
                description: Time-series daily rates between start_date and end_date.
                properties:
                  success:
                    type: boolean
                    example: true
                  timeseries:
                    type: boolean
                    description: True for timeseries responses.
                    example: true
                  start_date:
                    type: string
                    format: date
                  end_date:
                    type: string
                    format: date
                  base:
                    type: string
                    description: Base currency for rates in the timeframe.
                  rates:
                    type: object
                    description: Map of ISO date string -> map of currency -> rate.
                    additionalProperties:
                      type: object
                      additionalProperties:
                        type: number
                required:
                  - success
                  - timeseries
                  - start_date
                  - end_date
                  - base
                  - rates
              examples:
                default:
                  value:
                    success: true
                    timeseries: true
                    start_date: '2012-05-01'
                    end_date: '2012-05-03'
                    base: EUR
                    rates:
                      '2012-05-01':
                        USD: 1.322891
                        AUD: 1.278047
                        CAD: 1.302303
                      '2012-05-02':
                        USD: 1.315066
                        AUD: 1.274202
                        CAD: 1.299083
