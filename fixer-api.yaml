openapi: 3.1.0
info:
  title: Fixer API
  version: 1.0.0
  description: >
    Powered by 15+ exchange rate data sources, the Fixer API is capable of
    delivering real-time exchange rate data for 170 world currencies. The API
    comes with multiple endpoints, each serving a different use case. Endpoint
    functionalities include getting the latest exchange rate data for all or a
    specific set of currencies, converting amounts from one currency to another,
    retrieving Time-Series data for one or multiple currencies and querying the
    API for daily fluctuation data.
servers:
  - url: https://data.fixer.io/api
security:
  - AccessKeyQuery: []
paths:
  /symbols:
    get:
      summary: Supported Symbols
      description: >
        The Fixer API comes with a constantly updated endpoint returning all
        available currencies. To access this list, make a request to the API's
        Supported Symbols endpoint.
      operationId: getSymbols
      parameters:
        - name: access_key
          in: query
          required: true
          schema:
            type: string
          description: Your Fixer API access key.
          example: YOUR_API_KEY
        - name: callback
          in: query
          required: false
          schema:
            type: string
          description: >-
            JSONP callback function name. If provided, the response will be
            wrapped in this function.
          example: myCallback
      responses:
        '200':
          description: List of supported currency symbols.
          content:
            application/json:
              schema:
                type: object
                description: Response from `/symbols` listing supported currencies.
                properties:
                  success:
                    type: boolean
                    description: Whether the request succeeded.
                    example: true
                  symbols:
                    type: object
                    description: Map of currency code -> currency name.
                    additionalProperties:
                      type: string
                required:
                  - success
                  - symbols
              examples:
                default:
                  value:
                    success: true
                    symbols:
                      USD: United States Dollar
                      EUR: Euro
                      GBP: British Pound Sterling
        '400':
          description: Invalid or malformed request parameters.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Standard error response returned by Fixer when a request
                  fails.
                properties:
                  success:
                    type: boolean
                    description: Always false for error responses.
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                        description: >-
                          Numeric error code. (Fixer docs list common codes such
                          as 101, 104, 601-606, etc.)
                        example: 104
                      info:
                        type: string
                        description: >-
                          Human-readable message describing the error and next
                          steps.
                        example: >-
                          Your monthly API request volume has been reached.
                          Please upgrade your plan.
                    required:
                      - code
                required:
                  - success
                  - error
              examples:
                example:
                  value:
                    success: false
                    error:
                      code: 400
                      info: Bad Request - required parameter missing or malformed
        '401':
          description: Missing or invalid API key (Unauthorized).
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Standard error response returned by Fixer when a request
                  fails.
                properties:
                  success:
                    type: boolean
                    description: Always false for error responses.
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                        description: >-
                          Numeric error code. (Fixer docs list common codes such
                          as 101, 104, 601-606, etc.)
                        example: 104
                      info:
                        type: string
                        description: >-
                          Human-readable message describing the error and next
                          steps.
                        example: >-
                          Your monthly API request volume has been reached.
                          Please upgrade your plan.
                    required:
                      - code
                required:
                  - success
                  - error
              examples:
                invalid_key:
                  value:
                    success: false
                    error:
                      code: 401
                      info: >-
                        No API Key was specified or an invalid API Key was
                        specified.
        '429':
          description: Rate limit or monthly quota exceeded.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Standard error response returned by Fixer when a request
                  fails.
                properties:
                  success:
                    type: boolean
                    description: Always false for error responses.
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                        description: >-
                          Numeric error code. (Fixer docs list common codes such
                          as 101, 104, 601-606, etc.)
                        example: 104
                      info:
                        type: string
                        description: >-
                          Human-readable message describing the error and next
                          steps.
                        example: >-
                          Your monthly API request volume has been reached.
                          Please upgrade your plan.
                    required:
                      - code
                required:
                  - success
                  - error
              examples:
                limit_reached:
                  value:
                    success: false
                    error:
                      code: 104
                      info: >-
                        Your monthly API request volume has been reached. Please
                        upgrade your plan.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Standard error response returned by Fixer when a request
                  fails.
                properties:
                  success:
                    type: boolean
                    description: Always false for error responses.
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                        description: >-
                          Numeric error code. (Fixer docs list common codes such
