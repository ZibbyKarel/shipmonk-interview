  /latest:
    get:
      summary: Latest Rates
      description: >
        Depending on your subscription plan, the API's Latest Rates endpoint
        will return real-time exchange rate data updated every 60 minutes, every
        10 minutes or every 60 seconds.
          
        **Please note:** The default base currency is EUR.
      operationId: getLatestRates
      parameters:
        - name: access_key
          in: query
          required: true
          schema:
            type: string
          description: Your Fixer API access key.
          example: YOUR_API_KEY
        - name: base
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}$
          description: >
            Base currency (three-letter ISO code) to which returned rates are
            relative. Default base is EUR. Changing base may be restricted by
            subscription plan. :contentReference[oaicite:3]{index=3}
          example: USD
        - name: symbols
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}(,[A-Z]{3})*$
          description: >
            Comma-separated list of currency codes to limit the `rates`/`quotes`
            output (e.g., `USD,GBP,JPY`).
          example: USD,GBP,JPY
        - name: callback
          in: query
          required: false
          schema:
            type: string
          description: >-
            JSONP callback function name. If provided, the response will be
            wrapped in this function.
          example: myCallback
      responses:
        '200':
          description: Latest rates snapshot.
          content:
            application/json:
              schema:
                type: object
                description: Latest exchange rates (single snapshot).
                properties:
                  success:
                    type: boolean
                    description: Whether the request succeeded.
                    example: true
                  timestamp:
                    type: integer
                    description: UNIX timestamp of the data snapshot.
                    example: 1519296206
                  base:
                    type: string
                    description: Base currency for the rates (three-letter ISO code).
                    example: EUR
                  date:
                    type: string
                    format: date
                    description: Date of the rates snapshot (YYYY-MM-DD).
                    example: '2025-09-15'
                  rates:
                    type: object
                    description: Map of currency code -> numeric rate relative to `base`.
                    additionalProperties:
                      type: number
                required:
                  - success
                  - timestamp
                  - base
                  - date
                  - rates
              examples:
                default:
                  value:
                    success: true
                    timestamp: 1519296206
                    base: EUR
                    date: '2025-09-15'
                    rates:
                      USD: 1.23396
                      GBP: 0.882047
                      JPY: 132.360679
        '400':
          description: Invalid or malformed request parameters.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Standard error response returned by Fixer when a request
                  fails.
                properties:
                  success:
                    type: boolean
                    description: Always false for error responses.
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                        description: >-
                          Numeric error code. (Fixer docs list common codes such
                          as 101, 104, 601-606, etc.)
                        example: 104
                      info:
                        type: string
                        description: >-
                          Human-readable message describing the error and next
                          steps.
                        example: >-
                          Your monthly API request volume has been reached.
                          Please upgrade your plan.
                    required:
                      - code
                required:
                  - success
                  - error
              examples:
                example:
                  value:
                    success: false
                    error:
                      code: 400
                      info: Bad Request - required parameter missing or malformed
        '401':
          description: Missing or invalid API key (Unauthorized).
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Standard error response returned by Fixer when a request
                  fails.
                properties:
