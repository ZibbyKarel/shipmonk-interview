  /fluctuation:
    get:
      summary: Fluctuation
      description: >
        Using the Fixer API's Fluctuation endpoint you will be able to retrieve
        information about how currencies fluctuate on a day-to-day basis. To use
        this feature, simply append a `start_date` and `end_date` and choose
        which currencies (symbols) you would like to query the API for. Please
        note that the maximum allowed timeframe is 365 days.
      operationId: getFluctuation
      parameters:
        - name: access_key
          in: query
          required: true
          schema:
            type: string
          description: Your Fixer API access key.
          example: YOUR_API_KEY
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: >-
            Start date (inclusive) for timeseries/fluctuation queries
            (YYYY-MM-DD). Max window 365 days.
          example: '2015-12-01'
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: >-
            End date (inclusive) for timeseries/fluctuation queries
            (YYYY-MM-DD).
          example: '2015-12-24'
        - name: base
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}$
          description: >
            Base currency (three-letter ISO code) to which returned rates are
            relative. Default base is EUR. Changing base may be restricted by
            subscription plan. :contentReference[oaicite:3]{index=3}
          example: USD
        - name: symbols
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}(,[A-Z]{3})*$
          description: >
            Comma-separated list of currency codes to limit the `rates`/`quotes`
            output (e.g., `USD,GBP,JPY`).
          example: USD,GBP,JPY
        - name: callback
          in: query
          required: false
          schema:
            type: string
          description: >-
            JSONP callback function name. If provided, the response will be
            wrapped in this function.
          example: myCallback
      responses:
        '200':
          description: Fluctuation metrics for the requested period.
          content:
            application/json:
              schema:
                type: object
                description: Fluctuation analysis between two dates.
                properties:
                  success:
                    type: boolean
                    example: true
                  fluctuation:
                    type: boolean
                    description: True for fluctuation responses.
                    example: true
                  start_date:
                    type: string
                    format: date
                  end_date:
                    type: string
                    format: date
                  base:
                    type: string
                    description: Base currency for the returned metrics.
                  rates:
                    type: object
                    description: Map of currency -> fluctuation metrics.
                    additionalProperties:
                      type: object
                      properties:
                        start_rate:
                          type: number
                          description: Rate at `start_date`.
                        end_rate:
                          type: number
                          description: Rate at `end_date`.
                        change:
                          type: number
                          description: Absolute change (end_rate − start_rate).
                        change_pct:
                          type: number
                          description: Percentage change ((end_rate / start_rate) − 1).
                      required:
                        - start_rate
                        - end_rate
                        - change
                        - change_pct
                required:
                  - success
                  - fluctuation
                  - start_date
                  - end_date
                  - base
                  - rates
              examples:
                default:
                  value:
                    success: true
                    fluctuation: true
                    start_date: '2015-12-01'
                    end_date: '2015-12-24'
                    base: EUR
                    rates:
                      USD:
                        start_rate: 1.066494
                        end_rate: 1.073844
                        change: 0.00735
                        change_pct: 0.6899
