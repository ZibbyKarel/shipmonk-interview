  /{date}:
    get:
      summary: Historical Rates
      description: >
        Historical rates are available for most currencies all the way back to
        the year of 1999. You can query the Fixer API for historical rates by
        appending a date (format `YYYY-MM-DD`) to the base URL.
      operationId: getHistoricalRates
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
          description: >-
            Date path parameter in format `YYYY-MM-DD` for the historical
            endpoint.
          example: '2013-12-24'
        - name: access_key
          in: query
          required: true
          schema:
            type: string
          description: Your Fixer API access key.
          example: YOUR_API_KEY
        - name: base
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}$
          description: >
            Base currency (three-letter ISO code) to which returned rates are
            relative. Default base is EUR. Changing base may be restricted by
            subscription plan. :contentReference[oaicite:3]{index=3}
          example: USD
        - name: symbols
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}(,[A-Z]{3})*$
          description: >
            Comma-separated list of currency codes to limit the `rates`/`quotes`
            output (e.g., `USD,GBP,JPY`).
          example: USD,GBP,JPY
        - name: callback
          in: query
          required: false
          schema:
            type: string
          description: >-
            JSONP callback function name. If provided, the response will be
            wrapped in this function.
          example: myCallback
      responses:
        '200':
          description: Historical rates for the specified date.
          content:
            application/json:
              schema:
                type: object
                description: Historical rates for a given date.
                properties:
                  success:
                    type: boolean
                    description: Whether the request succeeded.
                    example: true
                  historical:
                    type: boolean
                    description: True for historical requests.
                    example: true
                  date:
                    type: string
                    format: date
                    description: Date requested.
                  timestamp:
                    type: integer
                    description: UNIX timestamp for the snapshot.
                  base:
                    type: string
                    description: Base currency for returned rates.
                  rates:
                    type: object
                    additionalProperties:
                      type: number
                required:
                  - success
                  - historical
                  - date
                  - timestamp
                  - base
                  - rates
              examples:
                default:
                  value:
                    success: true
                    historical: true
                    date: '2013-12-24'
                    timestamp: 1387929599
                    base: GBP
                    rates:
                      USD: 1.636492
                      EUR: 1.196476
                      CAD: 1.739516
