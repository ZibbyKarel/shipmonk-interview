  /convert:
    get:
      summary: Convert
      description: >
        The Fixer API comes with a separate currency conversion endpoint, which
        can be used to convert any amount from one currency to another. In order
        to convert currencies, please use the API's Convert endpoint, append the
        `from` and `to` parameters and set them to your preferred base and
        target currency codes.
      operationId: convertCurrency
      parameters:
        - name: access_key
          in: query
          required: true
          schema:
            type: string
          description: Your Fixer API access key.
          example: YOUR_API_KEY
        - name: from
          in: query
          required: true
          schema:
            type: string
          description: Source currency code used for convert endpoint.
          example: GBP
        - name: to
          in: query
          required: true
          schema:
            type: string
          description: Target currency code used for convert endpoint.
          example: JPY
        - name: amount
          in: query
          required: true
          schema:
            type: number
            minimum: 0
          description: Amount to convert (positive number).
          example: 25
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: >-
            Optional date (`YYYY-MM-DD`) for the convert endpoint to perform
            historical conversion.
          example: '2018-02-22'
        - name: callback
          in: query
          required: false
          schema:
            type: string
          description: >-
            JSONP callback function name. If provided, the response will be
            wrapped in this function.
          example: myCallback
      responses:
        '200':
          description: Conversion result and metadata.
          content:
            application/json:
              schema:
                type: object
                description: Convert endpoint response.
                properties:
                  success:
                    type: boolean
                    example: true
                  query:
                    type: object
                    description: Echo of conversion query parameters.
                    properties:
                      from:
                        type: string
                        description: Source currency code.
                        example: GBP
                      to:
                        type: string
                        description: Target currency code.
                        example: JPY
                      amount:
                        type: number
                        description: Amount requested to convert.
                        example: 25
                    required:
                      - from
                      - to
                      - amount
                  info:
                    type: object
                    description: Rate metadata used for conversion.
                    properties:
                      timestamp:
                        type: integer
                        description: UNIX timestamp of the rate used.
                        example: 1519328414
                      rate:
                        type: number
                        description: >-
                          Conversion rate used (1 unit of `from` equals `rate`
                          units of `to`).
                        example: 148.972231
                    required:
                      - timestamp
                      - rate
                  historical:
                    type: boolean
                    description: True if historical rates were used.
                  date:
                    type: string
                    format: date
                    description: Date associated with the rate used.
                  result:
                    type: number
                    description: Calculated converted amount.
                required:
                  - success
                  - query
                  - info
                  - result
              examples:
                default:
                  value:
                    success: true
                    query:
                      from: GBP
                      to: JPY
                      amount: 25
                    info:
                      timestamp: 1519328414
                      rate: 148.972231
                    historical: true
                    date: '2018-02-22'
                    result: 3724.305775
        '400':
          description: Invalid or malformed request parameters.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Standard error response returned by Fixer when a request
                  fails.
                properties:
                  success:
                    type: boolean
                    description: Always false for error responses.
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                        description: >-
                          Numeric error code. (Fixer docs list common codes such
