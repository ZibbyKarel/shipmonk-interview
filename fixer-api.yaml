components:
  securitySchemes:
    AccessKeyQuery:
      type: apiKey
      in: query
      name: access_key
      description: >
        API access key supplied as query parameter `access_key`. Required for
        all endpoints. See Fixer docs for how to generate an API key.
        :contentReference[oaicite:2]{index=2}
  parameters:
    access_key:
      name: access_key
      in: query
      required: true
      schema:
        type: string
      description: Your Fixer API access key.
      example: YOUR_API_KEY
    base:
      name: base
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Z]{3}$
      description: >
        Base currency (three-letter ISO code) to which returned rates are
        relative. Default base is EUR. Changing base may be restricted by
        subscription plan. :contentReference[oaicite:3]{index=3}
      example: USD
    symbols:
      name: symbols
      in: query
      required: false
      schema:
        type: string
        pattern: ^[A-Z]{3}(,[A-Z]{3})*$
      description: >
        Comma-separated list of currency codes to limit the `rates`/`quotes`
        output (e.g., `USD,GBP,JPY`).
      example: USD,GBP,JPY
    callback:
      name: callback
      in: query
      required: false
      schema:
        type: string
      description: >-
        JSONP callback function name. If provided, the response will be wrapped
        in this function.
      example: myCallback
    datePath:
      name: date
      in: path
      required: true
      schema:
        type: string
        format: date
      description: Date path parameter in format `YYYY-MM-DD` for the historical endpoint.
      example: '2013-12-24'
    dateQuery:
      name: date
      in: query
      required: false
      schema:
        type: string
        format: date
      description: >-
        Optional date (`YYYY-MM-DD`) for the convert endpoint to perform
        historical conversion.
      example: '2018-02-22'
    convert_from:
      name: from
      in: query
      required: true
      schema:
        type: string
      description: Source currency code used for convert endpoint.
      example: GBP
    convert_to:
      name: to
      in: query
      required: true
      schema:
        type: string
      description: Target currency code used for convert endpoint.
      example: JPY
    amount:
      name: amount
      in: query
      required: true
      schema:
        type: number
        minimum: 0
      description: Amount to convert (positive number).
      example: 25
    start_date:
      name: start_date
      in: query
      required: true
      schema:
        type: string
        format: date
      description: >-
        Start date (inclusive) for timeseries/fluctuation queries (YYYY-MM-DD).
        Max window 365 days.
      example: '2015-12-01'
    end_date:
      name: end_date
      in: query
      required: true
      schema:
        type: string
        format: date
      description: End date (inclusive) for timeseries/fluctuation queries (YYYY-MM-DD).
      example: '2015-12-24'
  schemas:
    ApiError:
      type: object
      description: Standard error response returned by Fixer when a request fails.
      properties:
        success:
          type: boolean
          description: Always false for error responses.
          example: false
        error:
          type: object
          properties:
            code:
              type: integer
              description: >-
                Numeric error code. (Fixer docs list common codes such as 101,
                104, 601-606, etc.)
              example: 104
            info:
              type: string
              description: Human-readable message describing the error and next steps.
              example: >-
                Your monthly API request volume has been reached. Please upgrade
                your plan.
          required:
            - code
      required:
        - success
        - error
    SymbolsResponse:
      type: object
      description: Response from `/symbols` listing supported currencies.
      properties:
        success:
          type: boolean
          description: Whether the request succeeded.
          example: true
        symbols:
          type: object
          description: Map of currency code -> currency name.
          additionalProperties:
            type: string
      required:
        - success
        - symbols
    LatestRatesResponse:
      type: object
      description: Latest exchange rates (single snapshot).
      properties:
        success:
          type: boolean
          description: Whether the request succeeded.
          example: true
        timestamp:
          type: integer
          description: UNIX timestamp of the data snapshot.
          example: 1519296206
        base:
          type: string
          description: Base currency for the rates (three-letter ISO code).
          example: EUR
        date:
          type: string
          format: date
          description: Date of the rates snapshot (YYYY-MM-DD).
          example: '2025-09-15'
        rates:
          type: object
          description: Map of currency code -> numeric rate relative to `base`.
          additionalProperties:
            type: number
      required:
        - success
        - timestamp
        - base
        - date
        - rates
    HistoricalRatesResponse:
      type: object
      description: Historical rates for a given date.
      properties:
        success:
          type: boolean
          description: Whether the request succeeded.
          example: true
        historical:
          type: boolean
          description: True for historical requests.
          example: true
        date:
          type: string
          format: date
          description: Date requested.
        timestamp:
          type: integer
          description: UNIX timestamp for the snapshot.
        base:
          type: string
          description: Base currency for returned rates.
        rates:
          type: object
          additionalProperties:
            type: number
      required:
        - success
        - historical
        - date
        - timestamp
        - base
        - rates
    ConvertQuery:
      type: object
      description: Echo of conversion query parameters.
      properties:
        from:
          type: string
          description: Source currency code.
          example: GBP
        to:
          type: string
          description: Target currency code.
          example: JPY
        amount:
          type: number
          description: Amount requested to convert.
          example: 25
      required:
        - from
        - to
        - amount
    ConvertInfo:
      type: object
      description: Rate metadata used for conversion.
      properties:
        timestamp:
          type: integer
          description: UNIX timestamp of the rate used.
          example: 1519328414
        rate:
          type: number
          description: Conversion rate used (1 unit of `from` equals `rate` units of `to`).
          example: 148.972231
      required:
        - timestamp
        - rate
    ConvertResponse:
      type: object
      description: Convert endpoint response.
      properties:
        success:
          type: boolean
          example: true
        query:
          type: object
          description: Echo of conversion query parameters.
          properties:
            from:
              type: string
              description: Source currency code.
              example: GBP
            to:
              type: string
              description: Target currency code.
              example: JPY
            amount:
              type: number
              description: Amount requested to convert.
              example: 25
          required:
            - from
            - to
            - amount
        info:
          type: object
          description: Rate metadata used for conversion.
          properties:
            timestamp:
              type: integer
              description: UNIX timestamp of the rate used.
              example: 1519328414
            rate:
              type: number
              description: >-
                Conversion rate used (1 unit of `from` equals `rate` units of
                `to`).
              example: 148.972231
          required:
            - timestamp
            - rate
        historical:
          type: boolean
          description: True if historical rates were used.
        date:
          type: string
          format: date
          description: Date associated with the rate used.
        result:
          type: number
          description: Calculated converted amount.
      required:
        - success
        - query
        - info
        - result
    TimeSeriesResponse:
      type: object
      description: Time-series daily rates between start_date and end_date.
      properties:
        success:
          type: boolean
          example: true
        timeseries:
          type: boolean
          description: True for timeseries responses.
          example: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        base:
          type: string
          description: Base currency for rates in the timeframe.
        rates:
          type: object
          description: Map of ISO date string -> map of currency -> rate.
          additionalProperties:
            type: object
            additionalProperties:
              type: number
      required:
        - success
        - timeseries
        - start_date
        - end_date
        - base
        - rates
    FluctuationResponse:
      type: object
      description: Fluctuation analysis between two dates.
      properties:
        success:
          type: boolean
          example: true
        fluctuation:
          type: boolean
          description: True for fluctuation responses.
          example: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        base:
          type: string
          description: Base currency for the returned metrics.
        rates:
          type: object
          description: Map of currency -> fluctuation metrics.
          additionalProperties:
            type: object
            properties:
              start_rate:
                type: number
                description: Rate at `start_date`.
              end_rate:
                type: number
                description: Rate at `end_date`.
              change:
                type: number
                description: Absolute change (end_rate − start_rate).
              change_pct:
                type: number
                description: Percentage change ((end_rate / start_rate) − 1).
            required:
              - start_rate
              - end_rate
              - change
              - change_pct
      required:
        - success
        - fluctuation
        - start_date
        - end_date
        - base
        - rates
