spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

fixer.api.base-url=http://data.fixer.io/api
fixer.api.key=test-key

resilience4j.retry.instances.fixer.max-attempts=3
resilience4j.retry.instances.fixer.wait-duration=1ms
resilience4j.retry.instances.fixer.enable-exponential-backoff=false
resilience4j.retry.instances.fixer.retry-exceptions=com.shipmonk.testingday.modules.rates.exception.TransientProviderException

# Smaller window so a handful of failures trip the breaker quickly in tests.
resilience4j.circuitbreaker.instances.fixer.sliding-window-size=4
resilience4j.circuitbreaker.instances.fixer.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.fixer.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.fixer.automatic-transition-from-open-to-half-open-enabled=false
